# Optional /runpod-volume overlay for ComfyUI model dirs.
# Baked /workspace/ComfyUI/models stays the primary search path; anything found
# under /runpod-volume/models/<kind>/ is added on top, so you can swap LoRAs and
# extras without rebuilding the image. If no network volume is attached, ComfyUI
# silently ignores the missing base_path.
runpod_serverless:
  base_path: /runpod-volume
  is_default: false
  checkpoints: models/checkpoints/
  clip: models/clip/
  clip_vision: models/clip_vision/
  configs: models/configs/
  controlnet: models/controlnet/
  diffusion_models: models/diffusion_models/
  embeddings: models/embeddings/
  loras: models/loras/
  text_encoders: models/text_encoders/
  unet: models/unet/
  upscale_models: models/upscale_models/
  vae: models/vae/
